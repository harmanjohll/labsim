<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Johll">
  <title>Precipitate Pursuit – SciSim</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/design-system.css?v=5">
  <link rel="stylesheet" href="game.css?v=1">
</head>
<body style="background: var(--bench-bg); color: #fff; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden;">

  <!-- Top Navigation -->
  <nav class="topbar" style="background: var(--color-surface); color: var(--color-text); flex-shrink: 0;">
    <a href="../../index.html" class="topbar-brand" style="text-decoration:none;">Sci<span>Sim</span></a>
    <span class="topbar-breadcrumb">
      <a href="../index.html">Games</a>
      <span class="separator">/</span>
      Precipitate Pursuit
    </span>
    <div class="topbar-actions">
      <span id="dark-mode-toggle"></span>
    </div>
  </nav>

  <!-- Name Entry Screen -->
  <div id="name-entry-screen" class="name-entry-screen">
    <div class="name-entry-panel">
      <h1>Precipitate Pursuit</h1>
      <p>Enter your name and choose a difficulty to begin.</p>
      <input type="text" id="player-name" placeholder="Enter your name">
      <select id="difficulty">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced" selected>Advanced</option>
      </select>
      <button id="start-game-button" class="btn btn-primary btn-lg w-full" style="margin-top: var(--sp-2);">Start Game</button>
    </div>
  </div>

  <!-- Main Game Board -->
  <div id="game-container" class="hidden" style="flex-grow: 1; flex-direction: column; width: 100%;">
    <div class="game-board-wrapper">
      <div id="game-board" class="game-board">
        <!-- Central Table Area -->
        <div class="central-table-outer">
          <div class="central-table-inner">
            <!-- Top 40%: Pending Set & Deck -->
            <div class="table-section table-section-top">
              <div class="pending-set-area">
                <h3 style="font-weight:700; font-size: var(--text-sm);">Pending Set</h3>
                <div id="pending-set" class="pending-set-cards"></div>
                <div id="countdown" class="countdown-text"></div>
              </div>
              <div style="width:1px;height:75%;background:rgba(255,255,255,0.2);"></div>
              <div class="deck-pile">
                <img id="deck-image" src="images/back-of-card.png" alt="deck">
                <div id="deck-counter" class="deck-counter">Deck: 0</div>
              </div>
            </div>
            <!-- Divider -->
            <div class="table-divider"></div>
            <!-- Middle 40%: Game Log -->
            <div class="table-section table-section-mid">
              <h3 class="game-log-title">Game Log</h3>
              <div id="log" class="game-log"></div>
            </div>
            <!-- Bottom 20%: Controls -->
            <div id="controls-area" class="table-section table-section-bottom">
              <button id="form-set-button" class="game-btn game-btn-form">Form Set</button>
              <button id="skip-turn-button" class="game-btn game-btn-skip">Draw & Skip</button>
              <button id="sabotage-button" class="game-btn game-btn-sabotage">Sabotage</button>
            </div>
          </div>
        </div>

        <!-- Player Name Tags -->
        <div id="player-0-name" class="player-name-tag"></div>
        <div id="player-1-name" class="player-name-tag"></div>
        <div id="player-2-name" class="player-name-tag"></div>
        <div id="player-3-name" class="player-name-tag"></div>

        <!-- Player Benches -->
        <div id="player-0-bench" class="bench"></div>
        <div id="player-1-bench" class="bench"></div>
        <div id="player-2-bench" class="bench"></div>
        <div id="player-3-bench" class="bench"></div>
      </div>
    </div>
  </div>

  <!-- Message Modal -->
  <div id="message-modal" class="hidden message-modal-overlay">
    <div class="message-modal">
      <p id="modal-text"></p>
      <button id="modal-close-button" class="btn btn-primary">OK</button>
    </div>
  </div>

  <script src="../../shared/dark-mode.js?v=5"></script>
  <script src="game.js?v=1"></script>
</body>
</html>
